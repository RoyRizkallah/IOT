# Mosquitto config for the SentryAgent dev stack.
#
# This is intentionally permissive — anonymous access, no TLS — because
# everything runs on a single laptop / one trusted LAN. Production deployment
# should add password files and TLS; that lives outside this repo.

# MQTT over TCP for the orchestrator + mock sensors + Flutter app.
listener 1883
protocol mqtt

# Optional: WebSockets for browser-based clients (Flutter web dev, MQTT
# Explorer in the browser, etc.). Mosquitto refuses to start if the listener
# bind fails, so we lean on it being unused most of the time.
listener 9001
protocol websockets

# Allow connections without credentials. Fine for the dev stack.
allow_anonymous true

# Persist retained messages + queued messages across restarts so the Flutter
# app gets the latest state on reconnect.
persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs broker` shows everything.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Keep messages flowing under a small dev workload.
max_queued_messages 1000
max_inflight_messages 50
