name: sentryagent
description: "SentryAgent — AI-powered home security mobile app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management.
  flutter_riverpod: ^2.6.1

  # Typography — Plus Jakarta Sans (UI) + JetBrains Mono (numbers).
  google_fonts: ^6.2.1

  # Date/time formatting (relative timestamps in History, agent log).
  intl: ^0.19.0

  # Sound waveform + temperature line chart on the Live Feed screen.
  fl_chart: ^0.69.2

  # MQTT — talks to the broker the orchestrator publishes on.
  mqtt_client: ^10.5.0

  # Persists the broker host/port between launches.
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
